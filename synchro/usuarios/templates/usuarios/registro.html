{% extends 'base.html' %}

{% block content %}
<div class="glass-panel auth-card">
    <h2 style="margin-bottom: 2rem; text-align: center; color: var(--accent);">Crear Cuenta</h2>
    
    <div id="errorBox" class="message-box message-error"></div>
    <div id="successBox" class="message-box message-success"></div>
    
    <form id="registroForm">
        <div class="form-group">
            <label for="nombre">Nombre o Apodo</label>
            <input type="text" id="nombre" class="form-control" required placeholder="Ej. Alex">
        </div>
        <div class="form-group">
            <label for="ciudad">Ciudad</label>
            <input type="text" id="ciudad" class="form-control" placeholder="Ej. Lima">
        </div>
        <div class="form-group">
            <label for="genero">Género</label>
            <select id="genero" class="form-control">
                <option value="">Selecciona una opción</option>
                <option value="Mujer">Mujer</option>
                <option value="Hombre">Hombre</option>
                <option value="No binario">No binario</option>
                <option value="Prefiero no decir">Prefiero no decir</option>
                <option value="Otro">Otro</option>
            </select>
        </div>
        <div class="form-group">
            <label for="fecha_nacimiento">Fecha de nacimiento</label>
            <input type="date" id="fecha_nacimiento" class="form-control">
        </div>
        <div class="form-group">
            <label for="intencion_busqueda">¿Qué buscas?</label>
            <select id="intencion_busqueda" class="form-control">
                <option value="">Selecciona una opción</option>
                {% for intencion in intenciones %}
                    <option value="{{ intencion.id_intencion }}">{{ intencion.nombre }}</option>
                {% empty %}
                    <option value="">Conocer personas</option>
                    <option value="">Amistad</option>
                    <option value="">Pareja</option>
                    <option value="">Ambos</option>
                {% endfor %}
            </select>
            <small style="display:block; margin-top:0.5rem; color: var(--text-muted);">Si todavía no se cargaron datos en la base, puedes completar el registro y después elegir tu intención real desde la encuesta.</small>
        </div>
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" class="form-control" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" minlength="8" class="form-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 1rem;" id="btnRegistroSubmit">
            Registrarse
        </button>
    </form>
    
    <div class="form-footer">
        ¿Ya tienes tu cuenta? <a href="{% url 'login_web' %}">Accede aquí</a>
    </div>
</div>

<script>
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nombre = document.getElementById('nombre').value;
        const ciudad = document.getElementById('ciudad').value;
        const genero = document.getElementById('genero').value;
        const fecha_nacimiento = document.getElementById('fecha_nacimiento').value;
        const intencion_busqueda = document.getElementById('intencion_busqueda').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        const btn = document.getElementById('btnRegistroSubmit');
        
        errorBox.style.display = 'none';
        successBox.style.display = 'none';
        
        btn.innerText = 'Procesando...';
        btn.disabled = true;

        try {
            const response = await fetch('/api/usuarios/registro/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nombre,
                    ciudad,
                    genero,
                    fecha_nacimiento: fecha_nacimiento || null,
                    intencion_busqueda: intencion_busqueda || null,
                    email,
                    password
                })
            });

            const data = await response.json();

            if (response.ok || response.status === 201) {
                successBox.style.display = 'block';
                successBox.innerText = '¡Cuenta creada! Ahora completa tu encuesta para recibir matches.';
                
                setTimeout(() => {
                    window.location.href = "{% url 'login_web' %}";
                }, 1500);

            } else {
                errorBox.style.display = 'block';
                // DRF validation errors usually come as objects. Let's stringify safely
                let errorMsg = 'No pudimos crear la cuenta. Verifica los datos.';
                if (data.email) errorMsg = "El correo ya está en uso.";
                
                errorBox.innerText = errorMsg;
                btn.innerText = 'Registrarse';
                btn.disabled = false;
            }
        } catch (error) {
            errorBox.style.display = 'block';
            errorBox.innerText = 'Error de conexión. Inténtalo más tarde.';
            btn.innerText = 'Registrarse';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
