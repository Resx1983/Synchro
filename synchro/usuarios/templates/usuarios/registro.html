{% extends 'base.html' %}

{% block content %}
<div class="glass-panel auth-card">
    <h2 style="margin-bottom: 2rem; text-align: center; color: var(--accent);">Crear Cuenta</h2>
    
    <div id="errorBox" class="message-box message-error"></div>
    <div id="successBox" class="message-box message-success"></div>
    
    <form id="registroForm">
        <div class="form-group">
            <label for="nombre">Nombre o Apodo</label>
            <input type="text" id="nombre" class="form-control" required placeholder="Ej. Alex">
        </div>
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" class="form-control" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" minlength="8" class="form-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 1rem;" id="btnRegistroSubmit">
            Registrarse
        </button>
    </form>
    
    <div class="form-footer">
        ¿Ya tienes tu cuenta? <a href="{% url 'login_web' %}">Accede aquí</a>
    </div>
</div>

<script>
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nombre = document.getElementById('nombre').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        const btn = document.getElementById('btnRegistroSubmit');
        
        errorBox.style.display = 'none';
        successBox.style.display = 'none';
        
        btn.innerText = 'Procesando...';
        btn.disabled = true;

        try {
            const response = await fetch('/api/usuarios/registro/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ nombre, email, password })
            });

            const data = await response.json();

            if (response.ok || response.status === 201) {
                // If success, log them in automatically or redirect to login.
                successBox.style.display = 'block';
                successBox.innerText = '¡Cuenta creada! Redirigiendo...';
                
                // Optional: Automatically login via JS by calling the login endpoint immediately 
                // but let's just do a redirect for simplicity.
                setTimeout(() => {
                    window.location.href = "{% url 'login_web' %}";
                }, 1500);

            } else {
                errorBox.style.display = 'block';
                // DRF validation errors usually come as objects. Let's stringify safely
                let errorMsg = 'No pudimos crear la cuenta. Verifica los datos.';
                if (data.email) errorMsg = "El correo ya está en uso.";
                
                errorBox.innerText = errorMsg;
                btn.innerText = 'Registrarse';
                btn.disabled = false;
            }
        } catch (error) {
            errorBox.style.display = 'block';
            errorBox.innerText = 'Error de conexión. Inténtalo más tarde.';
            btn.innerText = 'Registrarse';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
