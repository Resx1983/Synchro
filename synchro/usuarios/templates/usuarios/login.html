{% extends 'base.html' %}

{% block content %}
<div class="glass-panel auth-card">
    <h2 style="margin-bottom: 2rem; text-align: center; color: var(--primary);">Iniciar Sesión</h2>
    
    <div id="errorBox" class="message-box message-error"></div>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" class="form-control" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" class="form-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="btnLoginSubmit">
            Ingresar
        </button>
    </form>
    
    <div class="form-footer">
        ¿Aún no tienes cuenta? <a href="{% url 'registro_web' %}">Regístrate ahora</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('errorBox');
        const btn = document.getElementById('btnLoginSubmit');
        
        errorBox.style.display = 'none';
        btn.innerText = 'Cargando...';
        btn.disabled = true;

        try {
            const response = await fetch('/api/usuarios/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Save tokens
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                // Redirect to home explicitly
                window.location.href = "{% url 'inicio_web' %}";
            } else {
                errorBox.style.display = 'block';
                errorBox.innerText = data.detail || 'Credenciales incorrectas. Inténtalo de nuevo.';
                btn.innerText = 'Ingresar';
                btn.disabled = false;
            }
        } catch (error) {
            errorBox.style.display = 'block';
            errorBox.innerText = 'Error de conexión al servidor.';
            btn.innerText = 'Ingresar';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
